<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dominion Landscape Randomizer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="type-select">
            Events - Minimum: <button id="Event_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Event_min'></label><button id="Event_min_up_button" style="margin-bottom: 10px;">⬆️</button> Maximum: <button id="Event_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Event_max'></label><button id="Event_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Landmarks - Minimum: <button id="Landmark_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Landmark_min'></label><button id="Landmark_min_up_button" style="margin-bottom: 10px;">⬆️</button> Maximum: <button id="Landmark_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Landmark_max'></label><button id="Landmark_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Projects - Minimum: <button id="Project_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Project_min'></label><button id="Project_min_up_button" style="margin-bottom: 10px;">⬆️</button> Maximum: <button id="Project_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Project_max'></label><button id="Project_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Ways - Minimum: <button id="Way_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Way_min'></label><button id="Way_min_up_button" style="margin-bottom: 10px;">⬆️</button> Maximum: <button id="Way_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Way_max'></label><button id="Way_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Traits - Minimum: <button id="Trait_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Trait_min'></label><button id="Trait_min_up_button" style="margin-bottom: 10px;">⬆️</button> Maximum: <button id="Trait_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Trait_max'></label><button id="Trait_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>

        </div>
        <div class="component-checkboxes">
            <label><input type="checkbox", id = 'debt_check', checked = true> Debt Tokens (Empires)</label><br>
            <label><input type="checkbox", id = 'victory_check', checked = true> Victory Tokens</label><br>
            <label><input type="checkbox", id = 'adventures_check', checked = true> Adventures Tokens</label><br>
            <label><input type="checkbox", id = 'exile_check', checked = true> Exile Mat (Menagerie)</label><br>
            <label><input type="checkbox", id = 'loot_check'> Loot Cards (Plunder)</label><br>
            <label><input type="checkbox", id = 'coffer_check', checked = true> Coffers & Villagers Tokens (Renaissance)</label><br>
            <label><input type="checkbox", id = 'horse_check'> Horse Cards (Menagerie)</label>
        </div>
        <br>
        Total Cards <button id="Total_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='2', min='0', id = 'Total_count'></label><button id="Total_up_button" style="margin-bottom: 10px;">⬆️</button><br>
        <button id="submit_button" style="margin-bottom: 10px;">Randomize</button>
        <div id="card_div">
            <table id = "card_tbl">
            </table>

        </div>
    </div>
    <script src="lists.js"></script>
    <script src="landscape.js"></script>
</body>
</html>
