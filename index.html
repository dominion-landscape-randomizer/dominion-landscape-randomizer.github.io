<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dominion Landscape Randomizer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div id="card_div">
            <table id = "card_tbl">
            </table>
<div id = "trait_div">
<button id="Trait_?"style="margin-bottom: 10px;">?</button> Number of Cards Eligible for Trait <button id="Trait_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='10', min='0', id = 'Trait_count'></label><button id="Trait_up_button" style="margin-bottom: 10px;">⬆️</button><br><button id="Trait_Randomize"style="margin-bottom: 10px;">Select Card</button><br>
<textarea id="Trait_index" rows="1" cols="2" readonly placeholder=""></textarea>

</div>
        </div>
        Total Cards <button id="Total_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='2', min='0', id = 'Total_count'></label><button id="Total_up_button" style="margin-bottom: 10px;">⬆️</button><br>
        <button id="submit_button" style="margin-bottom: 10px;">Randomize</button>
        <div class="type-select">
            <p><b>Events</b></p><br>
            Minimum: <button id="Event_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Event_min'></label><button id="Event_min_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Maximum: <button id="Event_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Event_max'></label><button id="Event_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            <p><b>Landmarks</b></p><br>
            Minimum: <button id="Landmark_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='0', min='0', id = 'Landmark_min'></label><button id="Landmark_min_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Maximum: <button id="Landmark_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Landmark_max'></label><button id="Landmark_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            <p><b>Projects</b></p><br>
            Minimum: <button id="Project_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='0', min='0', id = 'Project_min'></label><button id="Project_min_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Maximum: <button id="Project_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='1', min='0', id = 'Project_max'></label><button id="Project_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            <p><b>Ways</b></p><br>
            Minimum: <button id="Way_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='0', min='0', id = 'Way_min'></label><button id="Way_min_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Maximum: <button id="Way_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='0', min='0', id = 'Way_max'></label><button id="Way_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            <p><b>Traits</b></p><br>
            Minimum: <button id="Trait_min_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='0', min='0', id = 'Trait_min'></label><button id="Trait_min_up_button" style="margin-bottom: 10px;">⬆️</button><br>
            Maximum: <button id="Trait_max_down_button" style="margin-bottom: 10px;">⬇️</button><label><input type="number", value='0', min='0', id = 'Trait_max'></label><button id="Trait_max_up_button" style="margin-bottom: 10px;">⬆️</button><br>

        </div>
        <div class="component-checkboxes">
            <label><input type="checkbox", id = 'debt_check', checked = true> Debt Tokens (Empires & Rising Sun)</label><br>
            <label><input type="checkbox", id = 'victory_check', checked = true> Victory Tokens</label><br>
            <label><input type="checkbox", id = 'adventures_check', checked = true> Adventures Tokens</label><br>
            <label><input type="checkbox", id = 'exile_check', checked = true> Exile Mat (Menagerie)</label><br>
            <label><input type="checkbox", id = 'loot_check'> Loot Cards (Plunder)</label><br>
            <label><input type="checkbox", id = 'coffer_check', checked = true> Coffers & Villagers Tokens (Renaissance)</label><br>
            <label><input type="checkbox", id = 'horse_check'> Horse Cards (Menagerie)</label>
        </div>
    </div>
    <script src="lists.js"></script>
    <script src="landscape.js"></script>
    <script src="trait.js"></script>
</body>
</html>
